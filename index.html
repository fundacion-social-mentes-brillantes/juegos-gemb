<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mentes Brillantes · El universo emocional</title>
<meta name="description" content="Plataforma de juegos emocionales de Gimnasio Emocional Mentes Brillantes: entrena tus emociones, reflexiona y crece jugando." />
<meta name="theme-color" content="#160d35" />

<!-- PWA: instalable en Android/iOS -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mentes Brillantes" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="cursor-aura" id="cursorAura" aria-hidden="true"></div>
<div class="world-bg" aria-hidden="true"></div>
<div class="aurora"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
<div class="motes" id="motes"></div>
<div class="wrap">
  <div class="topbar">
    <div class="brand" id="brand">
      <span class="brand-orbit"><img src="assets/logo-160.webp" alt="" /></span>
      <span><b>Mentes Brillantes</b><small>GIMNASIO EMOCIONAL</small></span>
    </div>
    <a class="nav-worlds" href="#portales">Explorar mundos <span>↓</span></a>
    <div class="userbox" id="userbox"></div>
    <button class="btn small install-btn" id="installBtn" hidden type="button">📲 Instalar</button>
  </div>

  <main id="app"><!-- render dinámico --></main>
</div>

<!-- Guía de instalación para iPhone (Safari no tiene botón automático) -->
<div class="ios-sheet" id="iosSheet" hidden>
  <div class="ios-card">
    <h3>📲 Instalar en tu iPhone</h3>
    <ol>
      <li>Toca el botón <b>Compartir</b> <span class="ios-ico">⬆️</span> (abajo en Safari)</li>
      <li>Busca y toca <b>“Añadir a pantalla de inicio”</b></li>
      <li>Toca <b>Añadir</b> — ¡y listo! 🎉</li>
    </ol>
    <button class="btn" id="iosClose" type="button">Entendido</button>
  </div>
</div>

<script src="content.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
